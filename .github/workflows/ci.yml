name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Local CI
        shell: pwsh
        run: ./scripts/ci.ps1 -Config ${{ matrix.configuration }} -IncludeSmoke

  publish:
    runs-on: windows-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish artifacts
        shell: pwsh
        run: ./scripts/ci.ps1 -Config Release -IncludePublish -PublishFlavor All

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecodex-windows-x64
          path: publish/ecodex-win-x64-sc/

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecodex-cli-windows-x64
          path: publish/ecodex-cli/
