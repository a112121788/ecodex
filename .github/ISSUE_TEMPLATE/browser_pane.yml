name: Browser Pane / WebView2 / Browser API
description: 报告内置浏览器 surface（WebView2）以及 `ecodex browser ...` 脚本化 API（v2 协议）相关问题。
title: "[Browser] <一句话描述>"
labels: ["browser", "webview2", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        参考 `spec/06-roadmap.md` M3 / M4 与 `spec/07-implementation-backlog.md` 包 M3 / M4。
        浏览器脚本化 API 处于活跃开发期，请先在 M4 文档范围内检查是否已实现。

  - type: input
    id: webview2_version
    attributes:
      label: WebView2 Runtime 版本
      description: "`edge://settings/help` 中的 Microsoft Edge / WebView2 版本。"
      placeholder: "125.0.2535.67"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 涉及能力
      options:
        - Browser surface 创建 / 分屏
        - 浏览器地址栏 / 导航 / 前进后退
        - DevTools 入口
        - 浏览器 URL / 历史 持久化
        - "`browser.snapshot` / refs"
        - "`browser.find.*` locator"
        - "`browser.click / fill / hover / press / eval / screenshot`"
        - "`browser.cookies / storage / console / dialog / download / highlight`"
        - v2 协议请求 / 错误码
        - NotSupported 矩阵
        - 其他
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 重现步骤
      description: |
        推荐给出：URL、CLI 调用、期望结果、实际结果。
        例子：
        1. `ecodex browser open-split https://example.com --direction right`
        2. `ecodex browser snapshot`
        3. 期望：返回 a11y 树 + refs；实际：返回 `{ok:false, error:{code:"..."}}`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误响应 / 日志
      description: |
        CLI / IPC / v2 响应；`daemon-debug.log`；注意脱敏 cookie / token。
      placeholder: |
        {
          "ok": false,
          "error": { "code": "not_found", "message": "..." }
        }
    validations:
      required: true

  - type: dropdown
    id: csp
    attributes:
      label: 目标页面是否设置了严格 CSP
      options:
        - 是（贴一段 `Content-Security-Policy` 头）
        - 否
        - 不确定
      default: 0

  - type: input
    id: related
    attributes:
      label: 关联 spec 章节
      placeholder: "spec/06-roadmap.md M4-B-02 / M4-B-07"
    validations:
      required: true
