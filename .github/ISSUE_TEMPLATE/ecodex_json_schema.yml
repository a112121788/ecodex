name: ecodex.json Schema / 命令面板
description: 报告 `.ecodex/ecodex.json` 或 `%USERPROFILE%\.config\ecodex\ecodex.json` 解析、命令面板、执行路径相关的行为问题或字段扩展。
title: "[ecodex.json] <一句话描述>"
labels: ["ecodex.json", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        参考 `spec/06-roadmap.md` M1-C 与 M3-C 的当前实现范围。
        提交时务必给出最小可复现的 ecodex.json 片段。
        如果涉及旧配置迁移，请在描述里同时附原始文件路径。

  - type: input
    id: config_path
    attributes:
      label: 配置文件路径
      placeholder: "%USERPROFILE%\\.config\\ecodex\\ecodex.json"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: 复现用的 ecodex.json
      description: 最小化片段；不要贴真实密钥。
      placeholder: |
        {
          "commands": [
            { "name": "Run Tests", "command": "dotnet test" }
          ],
          "actions": {
            "codex": { "type": "command", "title": "Codex", "command": "codex" }
          }
        }
    validations:
      required: true

  - type: dropdown
    id: issue_kind
    attributes:
      label: 类别
      options:
        - 解析失败 / schema 错误
        - 字段缺失或不支持
        - 命令面板未显示
        - 执行路径错误（currentTerminal / newTabInCurrentPane）
        - 全局 / 本地 / 项目内配置合并
        - 热重载
        - 其他
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: 期望 vs 实际
      placeholder: |
        期望：在命令面板看到“Run Tests”，回车后在当前 pane 输入 `dotnet test`。
        实际：命令面板未出现该项；设置 → 自定义命令显示 schema error：未知字段 `xxx`。
    validations:
      required: true

  - type: input
    id: related
    attributes:
      label: 关联 spec 章节
      placeholder: "spec/06-roadmap.md M1-C-01 / M1-C-02"
    validations:
      required: true
